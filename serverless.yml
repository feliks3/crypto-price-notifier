service: crypto-price-notifier

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-southeast-2
  stage: dev
  environment:
    SES_FROM_EMAIL: felikslyu@gmail.com
    PRICE_HISTORY_TABLE: ${self:service}-${sls:stage}-price-history
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
          Resource: '*'
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt PriceHistoryTable.Arn

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - http:
          path: health
          method: get

  price:
    handler: src/handlers/price.handler
    events:
      - http:
          path: price
          method: post

  history:
    handler: src/handlers/history.handler
    events:
      - http:
          path: history
          method: get
          cors: true

plugins:
  - serverless-offline

resources:
  Resources:
    PriceHistoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-price-history
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
          - AttributeName: createdAt
            KeyType: RANGE
