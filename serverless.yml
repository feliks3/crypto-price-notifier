service: crypto-price-notifier

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-southeast-2
  stage: dev
  environment:
    SES_FROM_EMAIL: felikslyu@gmail.com
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
          Resource: '*'

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - http:
          path: health
          method: get

  price:
    handler: src/handlers/price.handler
    events:
      - http:
          path: price
          method: post

plugins:
  - serverless-offline
